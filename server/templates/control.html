<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control Panel</title>
    <style>
      body {
        background: #111;
        color: white;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 20px;
        margin: 0;
      }
      h2 {
        margin-top: 0;
        color: #2979ff;
      }
      select {
        padding: 10px 15px;
        margin-bottom: 20px;
        background: #222;
        color: white;
        border: 1px solid #444;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
      }
      .container {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        max-width: 1200px;
      }
      .box {
        width: 160px;
        height: 130px;
        border-radius: 12px;
        background: #1e1e1e;
        padding: 15px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s ease;
        border: 2px solid #333;
        position: relative;
      }
      .box:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }
      .box.readonly {
        cursor: default;
      }
      .box.readonly:hover {
        transform: none;
        box-shadow: none;
      }
      .box.active {
        background: #2979ff;
        border-color: #fff;
      }
      /* alert class is ONLY applied based on server state, never on click */
      .box.alert {
        background: #ff3b3b;
        border-color: #fff;
        animation: pulse 1s infinite;
      }
      .box.disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      @keyframes pulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
        100% {
          opacity: 1;
        }
      }
      .output-id {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 10px;
      }
      .output-status {
        font-size: 14px;
        opacity: 0.9;
      }
      .badge {
        position: absolute;
        top: 10px;
        right: 10px;
        font-size: 11px;
        background: rgba(0, 0, 0, 0.5);
        padding: 2px 6px;
        border-radius: 10px;
      }
      .status-indicator {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 6px;
      }
      .status-on {
        background: #4caf50;
        box-shadow: 0 0 5px #4caf50;
      }
      .status-off {
        background: #666;
      }
    </style>
  </head>
  <body>
    <h2>Device Control Panel</h2>

    <div style="margin-bottom: 15px">
      <a href="/">
        <button
          style="
            background: #2979ff;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
          "
        >
          ← Back to Dashboard
        </button>
      </a>
    </div>
    <select id="deviceSelect"></select>
    <div class="container" id="outputs"></div>

    <script>
      let device = null;
      let refreshInterval = null;

      async function loadDevices() {
        try {
          const res = await fetch("/devices");
          const data = await res.json();
          const sel = document.getElementById("deviceSelect");
          sel.innerHTML = '<option value="">Select Device</option>';
          data.forEach((d) => {
            const opt = document.createElement("option");
            opt.value = d;
            opt.innerText = d;
            sel.appendChild(opt);
          });
          if (data.length) {
            device = data[0];
            sel.value = device;
            loadStates();
          }
          sel.onchange = () => {
            device = sel.value;
            device
              ? loadStates()
              : (document.getElementById("outputs").innerHTML = "");
          };
        } catch (e) {
          console.error("Error loading devices:", e);
        }
      }

      async function loadStates() {
        if (!device) return;
        try {
          const res = await fetch(`/states?device=${device}`);
          const data = await res.json();
          const container = document.getElementById("outputs");
          container.innerHTML = "";

          data.forEach((o) => {
            const box = document.createElement("div");
            box.className = "box";

            if (o.enabled === 0) {
              box.classList.add("disabled");
            } else if (o.value === 1) {
              // FIXED: alert class only comes from server's isAlert flag + value=1
              // Never applied on click
              box.classList.add(o.isAlert ? "alert" : "active");
            }

            const statusClass = o.value === 1 ? "status-on" : "status-off";
            const statusText = o.value === 1 ? "ON" : "OFF";
            const isActiveAlert = o.isAlert && o.value === 1;

            box.innerHTML = `
              <div class="badge">${o.isAlert ? "⚠️ ALERT" : "💡 OUTPUT"}</div>
              <div class="output-id">${o.id}</div>
              <div class="output-status">
                <span class="status-indicator ${statusClass}"></span>
                ${statusText}
              </div>
              <div style="font-size:11px;margin-top:8px;opacity:0.6;">
                ${
                  o.enabled === 0
                    ? "🔒 Disabled"
                    : isActiveAlert
                      ? "🚨 Active Alert"
                      : o.isAlert
                        ? "Alert output"
                        : "Click to toggle"
                }
              </div>`;

            if (o.isAlert) {
              // Alert outputs are read-only — driven by server rules, not the UI
              box.classList.add("readonly");
            } else if (o.enabled !== 0) {
              box.onclick = async () => {
                try {
                  const newValue = o.value ? 0 : 1;
                  await fetch("/set_output", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ device, id: o.id, value: newValue }),
                  });
                  box.classList.toggle("active", newValue === 1);
                  setTimeout(() => loadStates(), 300);
                } catch (e) {
                  console.error("Error toggling output:", e);
                }
              };
            } else {
              box.style.cursor = "not-allowed";
            }

            container.appendChild(box);
          });
        } catch (e) {
          console.error("Error loading states:", e);
        }
      }

      if (refreshInterval) clearInterval(refreshInterval);
      refreshInterval = setInterval(() => {
        if (device) loadStates();
      }, 2000);
      loadDevices();
    </script>
  </body>
</html>
